<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="MrBen">
    <meta name="description" content="JavaScript User Grade Calculator Challenge">

    <title>Grade Calculator</title>
</head>

<body>

    <script>

        let mark = Number(prompt("Enter your mark (0 - 100):"));

        if (mark >= 70 && mark <= 100) {
            document.write("<h1>Your Grade is: A</h1>");
        }
        else if (mark >= 50 && mark <= 60) {
            document.write("<h1>Your Grade is: C</h1>");
        }
        else if (mark >= 0 && mark <= 40) {
            document.write("<h1>Your Grade is: F</h1>");
        }
        else {
            document.write("<h1>No grade specified for this mark.</h1>");
        }

    </script>

</body>

</html>
