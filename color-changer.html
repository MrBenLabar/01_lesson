<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="MrBen">
    <meta name="description" content="JavaScript Color Changer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Webpage Color Changer</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 100px;
            transition: background-color 0.5s ease;
        }

        h1 {
            color: #fff;
        }

         p {
            color: #fff;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>

</head>

<body>

    <h1>Webpage Color Changer</h1>

    <p>Click the button below to change the background color to green.</p>

    <button onclick="changeColor()">Change Background Color</button>

    <script>

        function changeColor() {
            document.body.style.backgroundColor = "green";
        }

    </script>

</body>

</html>
