<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="MrBen">
    <meta name="description" content="JavaScript User Greeting Challenge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Greeting</title>
</head>

<body>

    <script>
        // Prompt the user for their name
        let username = prompt("Please enter your name:");

        // Display greeting in an alert box
        alert("Hello " + username + "!");

        // Display greeting on the webpage
        document.write("<h1><strong>Hello " + username + "!</strong></h1>");
    </script>

</body>

</html>
